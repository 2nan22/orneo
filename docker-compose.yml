# docker-compose.yml — Docker Compose Specification V2 (version 선언 없음)

services:
  db:
    image: postgres:16-alpine
    container_name: orneo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orneo}
      POSTGRES_USER: ${POSTGRES_USER:-orneo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orneo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orneo} -d ${POSTGRES_DB:-orneo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: orneo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - orneo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

networks:
  orneo_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
