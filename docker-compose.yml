# docker-compose.yml — Docker Compose Specification V2 (version 선언 없음)

services:
  db:
    image: postgres:16-alpine
    container_name: orneo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orneo}
      POSTGRES_USER: ${POSTGRES_USER:-orneo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - orneo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orneo} -d ${POSTGRES_DB:-orneo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: orneo_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - orneo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: orneo/backend:dev
    container_name: orneo_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    networks:
      - orneo_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/admin/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
      target: development
    image: orneo/ai_service:dev
    container_name: orneo_ai_service
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./ai_service:/app
    ports:
      - "8001:8001"
    networks:
      - orneo_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: orneo/backend:dev
    container_name: orneo_celery_worker
    restart: unless-stopped
    command: celery -A config worker -l info
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
    networks:
      - orneo_net
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    image: orneo/backend:dev
    container_name: orneo_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    volumes:
      - ./backend:/app
    networks:
      - orneo_net
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    image: orneo/frontend:dev
    container_name: orneo_frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      DJANGO_INTERNAL_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    networks:
      - orneo_net
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M

networks:
  orneo_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
